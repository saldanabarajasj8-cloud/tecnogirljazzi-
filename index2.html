      <h3>Calcular</h3>
  
    <p>Ingrese numeros separados por coma</p>
<input type="text" id="numeros"><br><br>

<button onclick="calcularpromedio()">Calcular promedio</button>

<br>
<script>
    function calcularpromedio(){
    let entrada = document.getElementById("numeros").value;
let arreglo = entrada.split(",");
let suma = 0;

for (let i = 0; i < arreglo.length; i++) {
    let numero = parseFloat(arreglo[i]);

    if(isNaN(numero)) {
        alert("Error: Ingrese solo numeros separados por comas");
        return;
    }
    suma += numero;
}
let promedio = suma / arreglo.length;

alert("El promedio es: " + promedio);

alert("El promedio es: "+ promedio);

}
</script>

    <div class="col-sm-4">
      <h3>Formula general</h3>
<label>a:</label>
<input type="number" id="a"><br><br>

<label>b:</label>
<input type="number" id="b"><br><br>


<label>c:</label>
<input type="number" id="c"><br><br>

<button onclick="x1()">x1</button>
<br>
<button onclick="x2()">x2</button>
<br>
<script>
    function x1(){
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

if (isNaN(a) || isNaN(b) || isNaN(c)){
alert("Por favor ingresa todos los numeros");
return;
}

let resultado = (-b + Math.sqrt(b**2-4*a*c))/(2*a);
alert("x1 es: " + resultado);
}

    function x2(){
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

if (isNaN(a) || isNaN(b) || isNaN(c)){
alert("Por favor ingresa todos los numeros");
return;
}

let resultado = (-b - Math.sqrt(b**2-4*a*c))/(2*a);
alert("x2 es: " + resultado);
}
</script>

alert("Por favor ingresa todos los numeros");

}

let resultadoX = (c1*b2-c2*b1)/(a1*b2-a2*b1);
