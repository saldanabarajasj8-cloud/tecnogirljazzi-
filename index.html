<label>Primer numero:</label>

<br>
<script>
    function sumar(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);

if (isNaN(n1) || isNaN(n2)){
alert("Por favor ingresa ambos numeros");
return;
}

let resultado = n1 + n2;
alert("La suma es: " + resultado);
}

    function restar(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);

if (isNaN(n1) || isNaN(n2)){
alert("Por favor ingresa ambos numeros");
return;
}

let resultado = n1 - n2;
alert("La resta es: " + resultado);
}

    function division(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);

if (isNaN(n1) || isNaN(n2)){
alert("Por favor ingresa ambos numeros");
return;
}

let resultado = n1 / n2;
alert("La division es: " + resultado);
}

    function Multiplicacion(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);

if (isNaN(n1) || isNaN(n2)){
alert("Por favor ingresa ambos numeros");
return;
}

let resultado = n1 * n2;
alert("La multiplicacion es: " + resultado);
}


    function Raizcuadrada(){
    let n1 = parseFloat(document.getElementById("num1").value);


if (isNaN(n1)){
alert("Por favor ingrese numero");
return;
}

let resultado = Math.sqrt(n1);
alert("La raiz cuadrada es: " + resultado);
}
</script>

    <div class="col-sm-4">
      <h3>Formula general</h3>
<label>a:</label>
<input type="number" id="a"><br><br>

<label>b:</label>
<input type="number" id="b"><br><br>


<label>c:</label>
<input type="number" id="c"><br><br>

<button onclick="x1()">x1</button>
<br>
<button onclick="x2()">x2</button>
<br>
<script>
    function x1(){
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

if (isNaN(a) || isNaN(b) || isNaN(c)){
alert("Por favor ingresa todos los numeros");
return;
}

let resultado = (-b + Math.sqrt(b**2-4*a*c))/(2*a);
alert("x1 es: " + resultado);
}

    function x2(){
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

if (isNaN(a) || isNaN(b) || isNaN(c)){
alert("Por favor ingresa todos los numeros");
return;
}

let resultado = (-b - Math.sqrt(b**2-4*a*c))/(2*a);
alert("x2 es: " + resultado);
}
</script>

   <script>
    function resolversistema(){
    let a1 = parseFloat(document.getElementById("a1").value);
    let b1 = parseFloat(document.getElementById("b1").value);
    let c1 = parseFloat(document.getElementById("c1").value);
    let a2 = parseFloat(document.getElementById("a2").value);
    let b2 = parseFloat(document.getElementById("b2").value);
    let c2 = parseFloat(document.getElementById("c2").value);

if (isNaN(a1) || isNaN(b1) || isNaN(c1) || isNaN(a2) || isNaN(b2) || isNaN(c2)){
alert("Por favor ingresa todos los numeros");
return;
}

let resultadoX = (c1*b2-c2*b1)/(a1*b2-a2*b1);
let resultadoY = (a1*c2-c1*a2)/(a1*b2-a2*b1);
alert("x es: " + resultadoX  +    "y es:" + resultadoY);

}
